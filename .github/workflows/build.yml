name: 🚀 编译 (Build)

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'ImmortalWrt 仓库的拥有者'
        type: string
        required: true
        default: 'ImmortalWrt'
      repo:
        description: 'ImmortalWrt 仓库的名字'
        type: string
        required: true
        default: 'ImmortalWrt'
      branch:
        description: 'ImmortalWrt 仓库的分支'
        type: string
        required: true
        default: 'openwrt-25.12'
      multithreading:
        description: '开启多线程编译'
        type: boolean
        default: true
      ssh:
        description: '使用 ssh 连接'
        type: boolean
        default: false

jobs:
  build:
    if: ${{inputs.ssh == false}}
    runs-on: ubuntu-latest
    name: 🚀 编译
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 克隆当前仓库
        uses: actions/checkout@v4

      - name: 克隆 ImmortalWrt
        uses: actions/checkout@v4
        with:
          repository: '${{inputs.owner}}/${{inputs.repo}}'
          ref: ${{inputs.branch}}
          path: ImmortalWrt

      - name: 直接生成干净 .config（彻底解决格式错误）
        working-directory: ImmortalWrt
        run: |
          cat > .config << 'EOF'
CONFIG_TARGET_rockchip=y
CONFIG_TARGET_rockchip_armv8=y
CONFIG_TARGET_MULTI_PROFILE=y
CONFIG_TARGET_DEVICE_rockchip_armv8_DEVICE_huakecloud_guangmiao-g4c=y
CONFIG_TARGET_KERNEL_PARTSIZE=64
CONFIG_TARGET_ROOTFS_PARTSIZE=1024
CONFIG_TARGET_ROOTFS_SQUASHFS=y
EOF

      - name: 更新 feeds
        working-directory: ImmortalWrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 非交互生成配置（不弹窗、不卡住）
        working-directory: ImmortalWrt
        run: |
          make olddefconfig V=s

      - name: 先编译工具（解决 mkhash 不存在）
        working-directory: ImmortalWrt
        run: |
          make tools/install -j$(nproc) V=s
          make toolchain/install -j$(nproc) V=s

      - name: 多线程编译
        if: ${{inputs.multithreading == true}}
        working-directory: ImmortalWrt
        run: |
          make -j2 V=s

      - name: 单线程编译
        if: ${{inputs.multithreading == false}}
        working-directory: ImmortalWrt
        run: |
          make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt
          path: ImmortalWrt/bin/targets

  build-ssh:
    if: ${{inputs.ssh == true}}
    runs-on: ubuntu-latest
    steps:
      - run: echo "SSH 模式暂时关闭，避免卡住"
